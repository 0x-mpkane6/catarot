<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 700" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <style>
      .frame { fill:#ffffff; stroke:#241b3a; stroke-width:2.5; }
      .nav { fill:#f4f1fb; stroke:#8b5cf6; stroke-width:1.2; }
      .card { fill:#faf8ff; stroke:#8b5cf6; stroke-width:1.2; }
      .hero { fill:#ede9fe; stroke:#7c3aed; stroke-width:1.5; }
      .t { fill:#241b3a; font-size:13px; }
      .tb { fill:#241b3a; font-size:13px; font-weight:600; }
      .ts { fill:#6f6391; font-size:11px; }
      .note { fill:#6f6391; font-size:11px; font-style:italic; }
    </style>
  </defs>

  <!-- phone frame -->
  <rect x="14" y="10" width="352" height="680" rx="28" class="frame"/>

  <!-- top nav -->
  <rect x="26" y="26" width="328" height="40" rx="9" class="nav"/>
  <text x="40" y="51" class="tb">Menu</text>
  <text x="190" y="51" text-anchor="middle" class="tb">CATAROT</text>
  <text x="340" y="51" text-anchor="end" class="t">Bạn</text>
  <text x="40" y="84" class="ts">thanh điều hướng (kính mờ, cố định)</text>

  <!-- greeting -->
  <text x="30" y="112" class="tb">Chào, &lt;tên người dùng&gt;</text>
  <text x="30" y="132" class="ts">Hôm nay những lá bài muốn nói gì...</text>

  <!-- hero card -->
  <rect x="26" y="146" width="328" height="92" rx="12" class="hero"/>
  <rect x="40" y="160" width="64" height="64" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="1"/>
  <text x="72" y="196" text-anchor="middle" class="ts">ảnh</text>
  <text x="120" y="184" class="tb">BẮT ĐẦU</text>
  <text x="120" y="206" class="t">Trải Bài</text>
  <text x="338" y="232" text-anchor="end" class="note">lá chính (hero)</text>

  <!-- 2x2 grid -->
  <rect x="26" y="252" width="158" height="86" rx="11" class="card"/>
  <text x="105" y="300" text-anchor="middle" class="tb">Hằng Ngày</text>
  <rect x="196" y="252" width="158" height="86" rx="11" class="card"/>
  <text x="275" y="300" text-anchor="middle" class="tb">Tầm Nhìn</text>
  <rect x="26" y="350" width="158" height="86" rx="11" class="card"/>
  <text x="105" y="398" text-anchor="middle" class="tb">Bài Đôi</text>
  <rect x="196" y="350" width="158" height="86" rx="11" class="card"/>
  <text x="275" y="398" text-anchor="middle" class="tb">Cộng Đồng</text>
  <text x="338" y="456" text-anchor="end" class="note">lưới 2 cột</text>

  <!-- cat hint -->
  <circle cx="58" cy="520" r="22" fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
  <text x="58" y="525" text-anchor="middle" class="ts">mèo</text>
  <text x="92" y="525" class="t">Chạm để rút nhanh 1 lá</text>
  <text x="92" y="543" class="note">(linh vật chỉ hiện ở màn này)</text>

  <text x="30" y="676" class="ts">Trang Chủ - bố cục điện thoại</text>
</svg>
