services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tarot-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override để CORS chấp nhận frontend container; cho phép inject origin thật khi deploy.
      API_ALLOWED_ORIGINS: "${API_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost,http://frontend}"
      DATABASE_URL: "sqlite:///./data/app.db"
      # SQLite chi nen chay 1 worker: nhieu process ghi chung 1 file SQLite gay
      # "database is locked" va race khi cap phat turn_index/duo-card/seed. Doi sang
      # Postgres + WEB_CONCURRENCY>1 neu can scale. Scheduler (automod/notify) cung
      # gia dinh single-worker de tranh chay trung lich.
      WEB_CONCURRENCY: 1
      # Trong container, 127.0.0.1 là chính container → trỏ Ollama (nếu dùng) về host.
      # LLM mặc định vẫn ưu tiên GEMINI_API_KEY nạp từ env_file ./backend/.env.
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    extra_hosts:
      # Cho phép container gọi service chạy trên host (Linux cần dòng này).
      - "host.docker.internal:host-gateway"
    volumes:
      # Persist DB và vision/RAG models giữa các lần restart.
      - tarot-data:/app/data
      - tarot-models:/app/models
      - tarot-uploads:/app/tmp_uploads
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8000}"
        VITE_GOOGLE_CLIENT_ID: "${VITE_GOOGLE_CLIENT_ID:-}"
    container_name: tarot-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  tarot-data:
  tarot-models:
  tarot-uploads:
